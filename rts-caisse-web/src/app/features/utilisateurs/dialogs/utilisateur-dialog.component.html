<h2 mat-dialog-title>Créer un utilisateur</h2>

<form [formGroup]="form" (ngSubmit)="valider()">
  <mat-dialog-content class="dialog-content">
    <mat-form-field appearance="outline">
      <mat-label>Matricule</mat-label>
      <input matInput formControlName="matricule" placeholder="RTS-C-0001" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Identifiant</mat-label>
      <input matInput formControlName="login" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Prénom</mat-label>
      <input matInput formControlName="prenom" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Nom</mat-label>
      <input matInput formControlName="nom" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>E-mail</mat-label>
      <input matInput type="email" formControlName="email" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Téléphone</mat-label>
      <input matInput formControlName="telephone" placeholder="+221..." />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Rôle</mat-label>
      <mat-select formControlName="role">
        <mat-option value="ADMIN">Administrateur</mat-option>
        <mat-option value="SUPERVISEUR">Superviseur</mat-option>
        <mat-option value="CAISSIER">Caissier</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Mot de passe</mat-label>
      <input matInput type="password" formControlName="motDePasse" />
      <mat-hint>Minimum 8 caractères</mat-hint>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="dialogRef.close()">Annuler</button>
    <button
      mat-flat-button
      color="primary"
      type="submit"
      [disabled]="form.invalid || loading()"
    >
      <mat-icon>check</mat-icon>
      Créer
    </button>
  </mat-dialog-actions>
</form>
