# =============================================================
#  RTS Caisse - Frontend Angular SPA
#  Conf nginx interne au conteneur "frontend"
#  (le conteneur "gateway" l'utilise comme upstream)
# =============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Securite : masque la version de nginx
    server_tokens off;

    # -----------------------------------------------------------
    #  Compression gzip
    # -----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml;

    # -----------------------------------------------------------
    #  Cache agressif sur les assets immuables (hash dans le nom)
    # -----------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # -----------------------------------------------------------
    #  Pas de cache sur index.html : MAJ visibles immediatement
    #  apres redeploiement
    # -----------------------------------------------------------
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # -----------------------------------------------------------
    #  SPA fallback : toutes les routes Angular Router retombent
    #  sur index.html (sinon refresh sur /dashboard => 404)
    # -----------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -----------------------------------------------------------
    #  Refus des fichiers caches sensibles (.git, .env, ...)
    # -----------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
