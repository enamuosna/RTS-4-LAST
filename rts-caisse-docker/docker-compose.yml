# =============================================================
#  RTS Caisse - docker-compose BUILD LOCAL
# =============================================================
#  Stack complete BUILDEE depuis le code source local.
#  Sert a tester le build de production AVANT de pousser sur Docker Hub.
#
#  Prerequis : avoir cote a cote
#    rts-caisse-backend/    (projet Spring Boot)
#    rts-caisse-web/        (projet Angular)
#    rts-caisse-docker/     (ce dossier)
#
#  Demarrer :  docker compose up -d --build
#  Arreter  :  docker compose down
# =============================================================

name: rts-caisse

services:

  postgres:
    image: postgres:16-alpine
    container_name: rts-caisse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-rts_caisse_db}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?ERREUR - definir POSTGRES_PASSWORD dans .env}
      TZ: Africa/Dakar
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rts-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rts_caisse_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      # Le code source du backend est dans le dossier voisin
      context: ../rts-caisse-backend
      dockerfile: ../rts-caisse-docker/backend/Dockerfile
    image: ${DOCKER_REGISTRY:-vnsu}/rts-caisse-backend:${APP_VERSION:-latest}
    container_name: rts-caisse-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_DB:       ${POSTGRES_DB:-rts_caisse_db}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET:        ${JWT_SECRET:?ERREUR - definir JWT_SECRET dans .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8090}
      TZ: Africa/Dakar
    networks:
      - rts-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ../rts-caisse-web
      dockerfile: ../rts-caisse-docker/frontend/Dockerfile
    image: ${DOCKER_REGISTRY:-vnsu}/rts-caisse-frontend:${APP_VERSION:-latest}
    container_name: rts-caisse-frontend
    restart: unless-stopped
    environment:
      TZ: Africa/Dakar
    networks:
      - rts-internal

  # ==========================================================
  #  CADDY - reverse proxy local (HTTP simple, pas de TLS)
  # ==========================================================
  #  Remplace l'ancien service "gateway" nginx (dossier supprime).
  #  Pour la prod HTTPS avec Let's Encrypt, utiliser plutot
  #  docker-compose.caddy.yml (qui consomme les images deja
  #  publiees sur le registry).
  # ==========================================================
  caddy:
    image: caddy:2.8-alpine
    container_name: rts-caisse-caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "${GATEWAY_PORT:-8090}:80"
    environment:
      TZ: Africa/Dakar
    volumes:
      - ./caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - rts-internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    name: rts-caisse-postgres-data
  caddy_data:
    name: rts-caisse-caddy-data-local
  caddy_config:
    name: rts-caisse-caddy-config-local

networks:
  rts-internal:
    name: rts-caisse-network
    driver: bridge