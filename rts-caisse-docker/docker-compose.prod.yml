name: rts-caisse

services:

  postgres:
    image: postgres:16-alpine
    pull_policy: if_not_present
    container_name: rts-caisse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-rts_caisse_db}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?ERREUR - definir POSTGRES_PASSWORD dans .env}
      TZ: Africa/Dakar
    ports:
      # Lié uniquement à localhost : postgres n'est pas exposé publiquement
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rts-internal
    healthcheck:
      # FIX : l'utilisateur du healthcheck doit correspondre à POSTGRES_USER
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rts_caisse_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ../rts-caisse-backend
      dockerfile: ../rts-caisse-docker/backend/Dockerfile
    # L'image est taguée lors du build ; "image:" permet aussi de la pousser manuellement si besoin
    image: ${DOCKER_REGISTRY:-vnsu}/rts-caisse-backend:${APP_VERSION:-latest}
    pull_policy: build          # Toujours reconstruire au lieu de tirer depuis le registry
    container_name: rts-caisse-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_DB:       ${POSTGRES_DB:-rts_caisse_db}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET:        ${JWT_SECRET:?ERREUR - definir JWT_SECRET dans .env}
      # FIX : valeur par défaut explicite pour éviter une chaîne vide si SERVER_NAME est absent
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://${SERVER_NAME:?ERREUR - definir SERVER_NAME dans .env}}
      TZ: Africa/Dakar
    networks:
      - rts-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ../rts-caisse-web
      dockerfile: ../rts-caisse-docker/frontend/Dockerfile
    image: ${DOCKER_REGISTRY:-vnsu}/rts-caisse-frontend:${APP_VERSION:-latest}
    pull_policy: build          # Toujours reconstruire
    container_name: rts-caisse-frontend
    restart: unless-stopped
    environment:
      TZ: Africa/Dakar
    networks:
      - rts-internal
    # Pas de healthcheck HTTP possible sur un conteneur statique pur ;
    # Caddy attend service_started, ce qui suffit.

  caddy:
    image: caddy:2.8-alpine
    pull_policy: if_not_present
    container_name: rts-caisse-caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      SERVER_NAME:       ${SERVER_NAME:?ERREUR - definir SERVER_NAME dans .env}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:?ERREUR - definir LETSENCRYPT_EMAIL dans .env}
      TZ: Africa/Dakar
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - rts-internal
    healthcheck:
      # FIX : /health n'existe pas dans Caddy par défaut.
      # On vérifie que le process répond sur le port 80 (HTTP → redirect vers HTTPS).
      # caddy validate est dispo dans l'image et confirme que le démon tourne.
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
    name: rts-caisse-postgres-data
  caddy_data:
    name: rts-caisse-caddy-data
  caddy_config:
    name: rts-caisse-caddy-config

networks:
  rts-internal:
    name: rts-caisse-network
    driver: bridge
