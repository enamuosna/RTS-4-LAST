# =============================================================
#  RTS Caisse - Nginx pour servir l'Angular SPA
# =============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Sécurité : masque la version de nginx
    server_tokens off;

    # Gzip pour réduire la taille des transferts
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/xml+rss text/javascript
               application/vnd.ms-fontobject application/x-font-ttf
               font/opentype image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # Cache agressif sur les assets immuables (hash dans le nom de fichier)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Pas de cache sur index.html pour que les MAJ soient visibles
    # immédiatement après un redéploiement
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA : toutes les routes inconnues (Angular Router) retombent sur
    # index.html. Sans ça, un refresh sur /dashboard donnerait 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Refuse les accès à des fichiers sensibles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
