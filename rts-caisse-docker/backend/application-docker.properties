# =============================================================
#  Profil "docker" - Spring Boot
#  Activé via SPRING_PROFILES_ACTIVE=docker (defini par docker-compose)
#
#  À placer dans : rts-caisse-backend/src/main/resources/application-docker.properties
# =============================================================

# -------------------------------------------------------------
#  Serveur
# -------------------------------------------------------------
# Port interne du conteneur backend. Doit correspondre :
#   - au upstream du gateway (gateway/default.conf -> server backend:9090)
#   - au healthcheck du Dockerfile backend
#   - au healthcheck du docker-compose
server.port=9090

# Le backend est derrière un reverse proxy nginx : il doit faire
# confiance aux X-Forwarded-* pour générer les bonnes URL absolues
# (mails, swagger-ui, redirects OAuth, etc.)
server.forward-headers-strategy=framework

# -------------------------------------------------------------
#  Datasource PostgreSQL (service Docker "postgres")
# -------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:rts_caisse_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de connexions (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

rts.security.super-admin-login=admin

# -------------------------------------------------------------
#  JPA / Hibernate
# -------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# -------------------------------------------------------------
#  Flyway (migrations versionnées)
# -------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# -------------------------------------------------------------
#  Sécurité - JWT
# -------------------------------------------------------------
# Secret HMAC injecte par docker-compose (variable JWT_SECRET du .env)
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# -------------------------------------------------------------
#  CORS
# -------------------------------------------------------------
# En prod l'API est sur la meme origine que le front (via gateway),
# CORS n'est donc utile que pour Swagger / outils externes.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8090}

# -------------------------------------------------------------
#  Actuator (healthcheck du conteneur)
# -------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true

# -------------------------------------------------------------
#  Upload de fichiers (recus, images produits, etc.)
# -------------------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# -------------------------------------------------------------
#  Logs
# -------------------------------------------------------------
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

# -------------------------------------------------------------
#  Swagger / OpenAPI (springdoc)
# -------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
