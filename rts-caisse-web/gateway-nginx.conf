# Fichier : rts-caisse-docker/nginx/default.conf
# (ou /etc/nginx/conf.d/default.conf dans le container "gateway")
#
# C'est LE fichier qui manque / qui est mal configuré.
# Il doit router :
#   /api/*  → container "backend" sur le port 8080
#   /       → container "frontend" sur le port 80
#
# ATTENTION : si tu as déjà ce fichier, vérifie bien qu'il N'A PAS
# de règle du type "location ~* \.(xlsx|pdf|doc)$" qui intercepterait
# l'URL AVANT le bloc /api/.

upstream backend {
    server backend:8080;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # Taille max pour les uploads éventuels
    client_max_body_size 20M;

    # Timeouts augmentés pour les gros téléchargements
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
    send_timeout          300s;

    # ---------- API Spring Boot ----------
    # IMPORTANT : ce bloc doit être DÉCLARÉ AVANT le bloc "/"
    location /api/ {
        proxy_pass http://backend;

        # Headers standards de proxy
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # CRUCIAL pour les téléchargements de fichiers binaires (xlsx, pdf) :
        # désactive le buffering pour streamer directement au client
        proxy_buffering off;
        proxy_request_buffering off;

        # Ne pas transformer / modifier la réponse
        proxy_redirect off;

        # NE PAS ajouter de headers qui pourraient masquer ceux du backend
        # En particulier, laisser passer Content-Disposition tel quel
    }

    # ---------- Swagger / OpenAPI (optionnel, utile pour tester) ----------
    location /v3/api-docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /swagger-ui {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ---------- Frontend Angular ----------
    # Doit être le DERNIER bloc, car c'est le fallback
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
