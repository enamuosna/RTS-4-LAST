<div class="page-container">
  <div class="page-header">
    <h1>Catégories d'opération</h1>
    <button mat-flat-button color="primary" (click)="creer()">
      <mat-icon>add</mat-icon>Nouvelle catégorie
    </button>
  </div>

  <div class="filters">
    <mat-button-toggle-group [(ngModel)]="filtreType" (change)="charger()">
      <mat-button-toggle value="">Toutes</mat-button-toggle>
      <mat-button-toggle value="ENTREE">Entrées</mat-button-toggle>
      <mat-button-toggle value="SORTIE">Sorties</mat-button-toggle>
    </mat-button-toggle-group>
  </div>

  <table mat-table [dataSource]="categories()">
    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef>Code</th>
      <td mat-cell *matCellDef="let c" class="code-cell">{{ c.code }}</td>
    </ng-container>

    <ng-container matColumnDef="libelle">
      <th mat-header-cell *matHeaderCellDef>Libellé</th>
      <td mat-cell *matCellDef="let c">{{ c.libelle }}</td>
    </ng-container>

    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Type</th>
      <td mat-cell *matCellDef="let c">
        <span
          class="badge"
          [class]="c.typeOperation === 'ENTREE' ? 'badge-success' : 'badge-danger'"
        >
          {{ c.typeOperation }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actif">
      <th mat-header-cell *matHeaderCellDef>État</th>
      <td mat-cell *matCellDef="let c">
        <span class="badge" [class]="c.actif ? 'badge-info' : 'badge-neutral'">
          {{ c.actif ? 'Active' : 'Inactive' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="actions-col"></th>
      <td mat-cell *matCellDef="let c">
        <button mat-icon-button (click)="modifier(c)">
          <mat-icon>edit</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colonnes"></tr>
    <tr mat-row *matRowDef="let row; columns: colonnes"></tr>
  </table>
</div>
