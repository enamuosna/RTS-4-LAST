<h2 mat-dialog-title>{{ data ? 'Modifier' : 'Nouvelle' }} catégorie</h2>

<form [formGroup]="form" (ngSubmit)="valider()">
  <mat-dialog-content class="dialog-content">
    <mat-form-field appearance="outline">
      <mat-label>Code</mat-label>
      <input matInput formControlName="code" [readonly]="!!data" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Libellé</mat-label>
      <input matInput formControlName="libelle" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Type</mat-label>
      <mat-select formControlName="typeOperation">
        <mat-option value="ENTREE">Entrée (encaissement)</mat-option>
        <mat-option value="SORTIE">Sortie (décaissement)</mat-option>
      </mat-select>
    </mat-form-field>

    @if (data) {
      <mat-slide-toggle formControlName="actif">Active</mat-slide-toggle>
    }
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="dialogRef.close()">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
      <mat-icon>check</mat-icon>Enregistrer
    </button>
  </mat-dialog-actions>
</form>
