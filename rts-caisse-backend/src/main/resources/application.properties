#============================================================
# RTS Caisse - Configuration Spring Boot (commune)
#============================================================
# Note : les profils Docker / dev surchargent certaines valeurs
# via application-docker.properties / application-dev.properties
#============================================================

spring.application.name=rts-caisse-backend
server.port=9090
server.servlet.context-path=/

#----- Datasource (overridé par profil docker) -----
spring.datasource.url=jdbc:postgresql://localhost:5432/rts_caisse_db
spring.datasource.username=postgres
spring.datasource.password=amc2622amc
spring.datasource.driver-class-name=org.postgresql.Driver


# Active/désactive l'envoi WhatsApp (à passer à true en prod)
rts.whatsapp.enabled=${WHATSAPP_ENABLED:false}

# Version de l'API Graph Meta
rts.whatsapp.api-version=${WHATSAPP_API_VERSION:v18.0}

# Identifiant Meta du numéro WhatsApp Business RTS
# Visible dans : developers.facebook.com → App → WhatsApp → API Setup
rts.whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}

# Bearer token permanent (System User Access Token)
# IMPORTANT : ne PAS utiliser le token de test 24h, mais générer un
# token permanent via un System User Meta Business.
# Doc : https://developers.facebook.com/docs/whatsapp/business-management-api/get-started
rts.whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}

# Indicatif pays par défaut (Sénégal = 221)
rts.whatsapp.default-country-prefix=${WHATSAPP_DEFAULT_PREFIX:221}
rts.security.super-admin-login=admin


#----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

#----- Flyway -----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

#----- Jackson (dates au format ISO, fuseau Dakar) -----
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Africa/Dakar

#----- JWT -----
app.jwt.secret=${JWT_SECRET:Y2xlLXNlY3JldGUtcnRzLWNhaXNzZS1zZW5lZ2FsLTIwMjYtYS1yZW1wbGFjZXItZW4tcHJvZHVjdGlvbi0xMjM0NTY3ODkw}
app.jwt.expiration-ms=86400000
app.jwt.issuer=RTS-Caisse

#----- Multipart -----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

#----- Logging -----
logging.level.root=INFO
logging.level.sn.rts.caisse=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

#----- OpenAPI / Swagger -----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

#============================================================
# CORS - UNE SEULE déclaration (priorité à la variable d'env)
#============================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080,http://localhost:8081}

#============================================================
# Spring Boot Actuator
#  Indispensable pour le healthcheck Docker (/actuator/health)
#  ATTENTION : whitelister ce path dans SecurityConfig sinon 401
#============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
