# ===================================================================
#  WhatsApp Business Cloud API (Meta)
#  À ajouter dans src/main/resources/application.properties du backend
# ===================================================================
#
#  ⚠ IMPORTANT : ne jamais commiter les vraies valeurs du token et du
#  phone-number-id. Seules les variables d'environnement sont lues en
#  prod. En local, créer un fichier application-local.properties (gitignoré)
#  avec les vraies valeurs.
# ===================================================================

# Active/désactive l'envoi WhatsApp (à passer à true en prod)
rts.whatsapp.enabled=${WHATSAPP_ENABLED:false}

# Version de l'API Graph Meta
rts.whatsapp.api-version=${WHATSAPP_API_VERSION:v18.0}

# Identifiant Meta du numéro WhatsApp Business RTS
# Visible dans : developers.facebook.com → App → WhatsApp → API Setup
rts.whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}

# Bearer token permanent (System User Access Token)
# IMPORTANT : ne PAS utiliser le token de test 24h, mais générer un
# token permanent via un System User Meta Business.
# Doc : https://developers.facebook.com/docs/whatsapp/business-management-api/get-started
rts.whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}

# Indicatif pays par défaut (Sénégal = 221)
rts.whatsapp.default-country-prefix=${WHATSAPP_DEFAULT_PREFIX:221}
