<h2 mat-dialog-title>{{ data ? 'Modifier la caisse' : 'Nouvelle caisse' }}</h2>

<form [formGroup]="form" (ngSubmit)="valider()">
  <mat-dialog-content class="dialog-content">
    <mat-form-field appearance="outline">
      <mat-label>Code</mat-label>
      <input matInput formControlName="code" [readonly]="!!data" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Libellé</mat-label>
      <input matInput formControlName="libelle" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Emplacement</mat-label>
      <input matInput formControlName="emplacement" />
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="dialogRef.close()">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
      <mat-icon>check</mat-icon>{{ data ? 'Enregistrer' : 'Créer' }}
    </button>
  </mat-dialog-actions>
</form>
