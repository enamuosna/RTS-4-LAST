<!-- utilisateurs.component.html -->
<div class="page-container">
    <div class="page-header">
        <h1>Utilisateurs</h1>
        <button mat-flat-button color="primary" (click)="creer()">
            <mat-icon>person_add</mat-icon>
            Nouvel utilisateur
        </button>
    </div>

    <table mat-table [dataSource]="utilisateurs()">

        <ng-container matColumnDef="matricule">
            <th mat-header-cell *matHeaderCellDef>Matricule</th>
            <td mat-cell *matCellDef="let u">{{ u.matricule }}</td>
        </ng-container>

        <ng-container matColumnDef="nom">
            <th mat-header-cell *matHeaderCellDef>Nom complet</th>
            <td mat-cell *matCellDef="let u">{{ u.prenom }} {{ u.nom }}</td>
        </ng-container>

        <ng-container matColumnDef="login">
            <th mat-header-cell *matHeaderCellDef>Login</th>
            <td mat-cell *matCellDef="let u">{{ u.login }}</td>
        </ng-container>

        <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>E-mail</th>
            <td mat-cell *matCellDef="let u">{{ u.email || '-' }}</td>
        </ng-container>

        <ng-container matColumnDef="role">
            <th mat-header-cell *matHeaderCellDef>Rôle</th>
            <td mat-cell *matCellDef="let u">
                <span class="badge" [class]="roleBadge(u.role)">{{ u.role }}</span>
            </td>
        </ng-container>

        <ng-container matColumnDef="actif">
            <th mat-header-cell *matHeaderCellDef>Statut</th>
            <td mat-cell *matCellDef="let u">
                <mat-slide-toggle
                        [checked]="u.actif"
                        (change)="activer(u, $event.checked)"
                ></mat-slide-toggle>
            </td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="actions-col"></th>
            <td mat-cell *matCellDef="let u" class="actions-col">

                @if (isSuperAdmin()) {
                    <button
                            mat-icon-button
                            matTooltip="Modifier le login"
                            (click)="modifierLogin(u)"
                    >
                        <mat-icon>edit</mat-icon>
                    </button>

                    <button
                            mat-icon-button
                            matTooltip="Réinitialiser mot de passe"
                            (click)="reinitialiserMdp(u)"
                    >
                        <mat-icon>password</mat-icon>
                    </button>
                }

                <button
                        mat-icon-button
                        color="warn"
                        matTooltip="Désactiver l'utilisateur"
                        (click)="supprimer(u)"
                >
                    <mat-icon>block</mat-icon>
                </button>

            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="colonnes"></tr>
        <tr mat-row *matRowDef="let row; columns: colonnes"></tr>

    </table>
</div>
