# =============================================================
#  Profil "docker" - surcharge de application.properties
#  Activé via SPRING_PROFILES_ACTIVE=docker
# =============================================================

# Datasource pointant sur le container Postgres
spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:rts_caisse_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:amc2622amc}

# =============================================================
#  STRATÉGIE DE SCHÉMA
# =============================================================
# Option A (rapide, dev/test) : Hibernate crée et met à jour le schéma
#   ddl-auto=update    -> crée les tables manquantes, ajoute colonnes,
#                         ne supprime jamais rien (sûr en dev)
#   flyway.enabled=false -> on désactive Flyway pour éviter le conflit
#
# Option B (propre, prod) : Flyway gère les migrations
#   ddl-auto=validate
#   flyway.enabled=true
#   + dépendances flyway-core et flyway-database-postgresql dans pom.xml
#   + scripts SQL dans src/main/resources/db/migration/
# =============================================================
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

# Active/désactive l'envoi WhatsApp (à passer à true en prod)
rts.whatsapp.enabled=${WHATSAPP_ENABLED:false}

# Version de l'API Graph Meta
rts.whatsapp.api-version=${WHATSAPP_API_VERSION:v18.0}

# Identifiant Meta du numéro WhatsApp Business RTS
# Visible dans : developers.facebook.com → App → WhatsApp → API Setup
rts.whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}

# Bearer token permanent (System User Access Token)
# IMPORTANT : ne PAS utiliser le token de test 24h, mais générer un
# token permanent via un System User Meta Business.
# Doc : https://developers.facebook.com/docs/whatsapp/business-management-api/get-started
rts.whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}

# Indicatif pays par défaut (Sénégal = 221)
rts.whatsapp.default-country-prefix=${WHATSAPP_DEFAULT_PREFIX:221}

# Logs JSON friendly
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# CORS lu depuis la variable d'environnement
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080}
